services:
  app:
    build: .
    ports:
      - "8000:8000"
    volumes:
      - .:/var/www/html
      # Vendor & node_modules disimpan di volume Docker sendiri, bukan dari host,
      # supaya tidak bentrok dengan binary native yang beda arsitektur/OS.
      - vendor:/var/www/html/vendor
      - node_modules:/var/www/html/node_modules
    tty: true
    stdin_open: true

volumes:
  vendor:
  node_modules:
